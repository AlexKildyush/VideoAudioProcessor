name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore "VideoAudioProcessor.sln" --configfile NuGet.Config

      - name: Build solution
        run: dotnet build "VideoAudioProcessor.sln" --configuration Release --no-restore

  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build --tag video-audio-processor-ci .

      - name: Run integration tests
        run: docker run --rm video-audio-processor-ci
